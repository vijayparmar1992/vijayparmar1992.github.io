<script>
  // Mobile menu toggle
  const menuToggle = document.getElementById('menuToggle');
  const sidebar = document.getElementById('sidebar');
  const body = document.body;
  
  if (menuToggle) {
    menuToggle.addEventListener('click', () => {
      const isOpen = sidebar.classList.toggle('open');
      body.classList.toggle('menu-open');
      menuToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });

    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
      if (body.classList.contains('menu-open') &&
          !sidebar.contains(e.target) &&
          !menuToggle.contains(e.target)) {
        sidebar.classList.remove('open');
        body.classList.remove('menu-open');
        menuToggle.setAttribute('aria-expanded', 'false');
      }
    });

    // Close menu when clicking a nav link
    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth <= 768) {
          sidebar.classList.remove('open');
          body.classList.remove('menu-open');
          menuToggle.setAttribute('aria-expanded', 'false');
        }
      });
    });
  }
  
  // Theme toggle functionality
  const themeToggle = document.getElementById('themeToggle');
  const html = document.documentElement;
  
  // Check for saved theme preference or default to 'light'
  const currentTheme = localStorage.getItem('theme') || 'light';
  html.setAttribute('data-theme', currentTheme);
  
  themeToggle.addEventListener('click', () => {
    const theme = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    html.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
  });
  
  // Active navigation highlighting
  const navLinks = document.querySelectorAll('.nav-link');
  const currentPath = window.location.pathname;
  const currentHash = window.location.hash;
  
  // Function to update active link
  function updateActiveLink() {
    navLinks.forEach(link => {
      link.classList.remove('active');
      const href = link.getAttribute('href');
      
      // Check if it's the AI Journey page
      if (href === '/ai-journey.html' && (currentPath.includes('ai-journey') || currentPath.endsWith('ai-journey.html'))) {
        link.classList.add('active');
      }
      // Check if it's a hash link on the main page
      else if (href.startsWith('/#') && (currentPath === '/' || currentPath.includes('index')) && href.includes(currentHash)) {
        link.classList.add('active');
      }
      // Default to About on main page
      else if (href === '/#about' && (currentPath === '/' || currentPath.includes('index')) && !currentHash) {
        link.classList.add('active');
      }
    });
  }
  
  // Initial call
  updateActiveLink();
  
  // Update on hash change
  window.addEventListener('hashchange', updateActiveLink);
  
  // Smooth scroll for hash links on same page
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function (e) {
      e.preventDefault();
      const target = document.querySelector(this.getAttribute('href'));
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });
</script>
